<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脆癮症報告：社群陰暗面鑑定器</title>
    
    <!-- 社群分享縮圖設定 -->
    <meta property="og:title" content="脆癮症鑑定器：你是哪種社群人格？">
    <meta property="og:description" content="12 題強迫直覺二選一，直擊你潛意識裡最討人厭的社交人格。">
    <meta property="og:image" content="https://i.postimg.cc/nzv6Jmxf/og-image.png">
    <meta property="twitter:card" content="summary_large_image">

    <!-- 腳本與樣式 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --accent-color: #00ff66; --text-color: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 450px; }
        .btn { background: var(--accent-color); color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.2s; }
        .btn:hover { box-shadow: 0 0 15px var(--accent-color); }
        
        #capture-area { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border: 2px solid var(--accent-color); padding: 30px; border-radius: 20px; text-align: center; }
        .result-title { font-size: 1.6rem; color: var(--accent-color); margin: 15px 0; font-weight: 800; }
        #quiz-page, #result-page { display: none; }
        .option-btn { background: #222; color: #fff; border: 1px solid #444; padding: 15px; margin: 10px 0; width: 100%; border-radius: 12px; cursor: pointer; text-align: left; }
        .option-btn:hover { border-color: var(--accent-color); }
    </style>
</head>
<body>

<div class="container">
    <!-- 首頁 -->
    <div id="start-page" style="text-align: center; margin-top: 50px;">
        <h1>脆癮症報告</h1>
        <p style="color: #888;">直擊你潛意識裡的社群人格</p>
        <button class="btn" onclick="startQuiz()">開始偵測狀態</button>
    </div>

    <!-- 測驗頁 -->
    <div id="quiz-page">
        <div id="q-num" style="color:var(--accent-color); font-size:0.8rem; margin-bottom:10px;">QUESTION 01</div>
        <div id="q-text" style="font-size: 1.2rem; margin-bottom: 20px;">載入中...</div>
        <button class="option-btn" id="opt-A" onclick="selectOption('A')">選項 A</button>
        <button class="option-btn" id="opt-B" onclick="selectOption('B')">選項 B</button>
    </div>

    <!-- 結果頁 -->
    <div id="result-page">
        <div id="capture-area">
            <div style="color:var(--accent-color); font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;">社群陰暗面鑑定報告</div>
            <div id="res-icon" style="font-size: 4rem; margin: 10px 0;">👾</div>
            <div class="result-title" id="res-title"></div>
            <div id="res-desc" style="font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px;"></div>
            <div style="font-size: 0.75rem; opacity: 0.6; border-top: 1px solid #333; padding-top: 10px;">⚠️ 警語：測完請立刻去摸摸草</div>
        </div>
        <button class="btn" onclick="saveImage()">儲存海報並分享到脆</button>
        <button class="btn" style="background:none; border:1px solid #444; color:#fff;" onclick="location.reload()">再測一次</button>
    </div>
</div>

<script>
    const questions = [
        { text: "在網路上看到有人亂發言，你的直覺是？", a: "Ti", b: "Te", aText: "心裡默默翻白眼，覺得對方沒長腦。", bText: "直接留言開打，或轉發給朋友一起吃瓜。" },
        { text: "面對人際內耗，你通常會？", a: "Fi", b: "Fe", aText: "退回自己的小世界，完全不想理人。", bText: "過度在意別人的評價，瘋狂腦補。" }
    ];
    let cur = 0, scores = { Ti:0, Te:0, Fi:0, Fe:0 };

    function startQuiz() { document.getElementById('start-page').style.display='none'; document.getElementById('quiz-page').style.display='block'; showQ(); }
    
    function showQ() {
        if(cur >= questions.length) { showRes(); return; }
        document.getElementById('q-text').innerText = questions[cur].text;
        document.getElementById('opt-A').innerText = questions[cur].aText;
        document.getElementById('opt-B').innerText = questions[cur].bText;
    }

    function selectOption(c) {
        c === 'A' ? scores[questions[cur].a]++ : scores[questions[cur].b]++;
        cur++; showQ();
    }

    function showRes() {
        document.getElementById('quiz-page').style.display='none';
        document.getElementById('result-page').style.display='block';
        document.getElementById('res-title').innerText = "【網路偏執槓精】";
        document.getElementById('res-desc').innerText = "你總能精準找到別人的邏輯漏洞，脆上的 80% 的廢文對你來說都是災難。";
    }

    function saveImage() {
        html2canvas(document.getElementById("capture-area"), { backgroundColor: "#000" }).then(canvas => {
            const link = document.createElement("a");
            link.download = "我的社群人格.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
            window.open("https://www.threads.net/", "_blank");
        });
    }
</script>
</body>
</html>
