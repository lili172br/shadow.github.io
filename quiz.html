<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脆癮症報告：社群陰暗面鑑定器</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9874958587973886" crossorigin="anonymous"></script>
    
    <meta property="og:title" content="脆癮症報告：社群陰暗面鑑定器">
    <meta property="og:description" content="12 題強迫直覺二選一，直擊你潛意識裡最討人厭的社交人格。">
    <meta property="og:image" content="https://li172br.github.io/social-preview.png">
    <meta property="og:url" content="https://li172br.github.io/quiz.html">
    <meta property="og:type" content="website">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-color: #0d0d0d; --card-bg: #1a1a1a; --accent-color: #00ff66; --text-color: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; padding: 20px; font-family: -apple-system, sans-serif; }
        .container { width: 100%; max-width: 450px; background: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid #333; }
        #start-page { text-align: center; }
        .btn { background: var(--accent-color); color: #000; border: none; padding: 14px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
        #quiz-page, #result-page { display: none; }
        .option-btn { background: #252525; color: white; border: 1px solid #444; padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; cursor: pointer; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <div id="start-page">
        <h1>脆癮症報告</h1>
        <p>12 題強迫直覺二選一，直擊你潛意識裡最討人厭的社交人格。</p>
        <button class="btn" onclick="startQuiz()">開始偵測狀態</button>
    </div>

    <div id="quiz-page">
        <div id="q-text" style="margin-bottom: 20px; font-weight: bold; font-size: 1.2rem;"></div>
        <button class="option-btn" id="opt-A" onclick="selectOption('A')"></button>
        <button class="option-btn" id="opt-B" onclick="selectOption('B')"></button>
    </div>

    <div id="result-page">
        <div id="capture-area" style="background:#141414; padding:25px; border:2px solid #00ff66; border-radius:12px; text-align:center;">
            <div id="res-title" style="font-size:1.5rem; font-weight:bold; margin-bottom:15px; color:#fff;">【鑑定結果報告】</div>
            <div id="res-desc" style="font-size:0.95rem; color:#ddd; line-height:1.6;">分析完成，請下載結果圖。</div>
        </div>
        
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9874958587973886" data-ad-slot="YOUR_AD_SLOT_ID" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

        <button class="btn" onclick="saveAsImageAndRedirect()">儲存結果截圖並領取優惠</button>
    </div>
</div>

<script>
    const questions = [
        { type: "T", aScore: "Ti", bScore: "Te", text: "在脆上滑到沒做功課、上網查就有答案的「伸手黨」提問，你直覺是？", aText: "有夠躁，直接在心中翻白眼或開噴，覺得對方沒長腦。", bText: "雖然很瞎，但還是會點開留言區看有沒有人開打，順便吃瓜。" },
        { type: "T", aScore: "Ti", bScore: "Te", text: "當網路上爆出某個大網紅的翻車大瓜，但證據還很不完整時，你會？", aText: "搬出鍵盤柯南精神，瘋狂交叉比對時間軸和漏洞看穿真相。", bText: "管他真的假的，先跟著大家在留言區卡一個哈密瓜轉發再說。" },
        { type: "T", aScore: "Ti", bScore: "Te", text: "朋友找你抱怨工作遇到了超級大爛人，你的安慰風格通常是？", aText: "保持理性，幫他分析那個爛人的心理，並幫忙想下一步對策。", bText: "站在他那邊，陪他一起瘋狂痛罵對方，發洩完情緒再說。" },
        { type: "F", aScore: "Fe", bScore: "Fi", text: "當你在群組講了一個自認好笑的梗，結果「完全沒人回、被無情洗貼圖」，你會？", aText: "表面裝沒事，但內心開始焦慮大家是不是在排擠我，默默想收回。", bText: "覺得是這群人不懂幽默，反正我自己覺得好笑就好。" },
        { type: "F", aScore: "Fi", bScore: "Fe", text: "好朋友突然退你追蹤，被你發現了，你的內心小劇場是？", aText: "算了啦，反正每個人階段不同，搞不好只是按錯或合不來。", bText: "天崩地裂，開始瘋狂回想最近是不是講錯話，陷入人際內耗。" },
        { type: "F", aScore: "Fe", bScore: "Fi", text: "看到大家都在轉發某個正能量語錄，或是集體為某件事感動落淚時，你通常？", aText: "覺得有點溫馨，也會想跟著點讚或轉發分享這份正能量。", bText: "內心毫無波動，甚至覺得這群人集體自我感動到有點矯情。" },
        { type: "S", aScore: "Si", bScore: "Se", text: "看到網路上爆合的某個熱門景點、或是排隊排到爆的潮流公仔，你的反應是？", aText: "大家都去衝，這有什麼好稀奇的？反而故意不想去了解。", bText: "看看大家都在瘋什麼，搞不好很有趣，會想點進去或跟著買買看。" },
        { type: "S", aScore: "Se", bScore: "Si", text: "半夜突然失眠，在床上翻來覆去的時候，你通常都在想什麼？", aText: "沒想什麼，純粹點開各種沒營養的短影音或脆，滑到眼睛酸。", bText: "開始回想國中時期的黑歷史，或者焦慮五年後的自己會在哪裡。" },
        { type: "S", aScore: "Se", bScore: "Si", text: "關於生活或工作的「大方向改變」（例如換工作、搬家），你更符合哪種？", aText: "遇到機會就先衝了再說，計畫趕不上變化，船到橋頭自然直。", bText: "必須做好全面的心理準備和儲蓄計畫，不然會極度沒有安全感。" },
        { type: "N", aScore: "Ni", bScore: "Ne", text: "突然被主管或老師在工作群組單獨 @ (艾特)，你的第一直覺是？", aText: "慘了，我是不是做錯什麼事？大腦自動腦補出各種最壞狀況。", bText: "煩死了又有什麼事？手頭的事情先做完，等一下再點開。" },
        { type: "N", aScore: "Ne", bScore: "Ni", text: "你平常使用手機、滑社群的真實狀態更接近哪一種？", aText: "注意力很難集中，同時開好幾個視窗或 App 換來換去，但都沒看完。", bText: "看到有興趣的主題就會瘋狂往下挖，不知不覺看完整個八卦懶人包。" },
        { type: "N", aScore: "Ne", bScore: "Ni", text: "看到別人發了一篇語氣很酸、但沒有指名道姓的「黑名單抱怨文」，你會？", aText: "覺得跟自己無關，純粹當成別人的生活碎念，看過就忘。", bText: "開始對號入座，懷疑對方是不是在暗諷自己，或瘋狂猜測他在罵誰。" }
    ];

    let currentQuestion = 0;
    let userScores = { Ti:0, Te:0, Fi:0, Fe:0, Si:0, Se:0, Ni:0, Ne:0 };

    function startQuiz() { document.getElementById('start-page').style.display = 'none'; document.getElementById('quiz-page').style.display = 'block'; showQ(); }
    function showQ() {
        if(currentQuestion >= questions.length) { calculateResult(); return; }
        const q = questions[currentQuestion];
        document.getElementById('q-text').innerText = q.text;
        document.getElementById('opt-A').innerText = q.aText;
        document.getElementById('opt-B').innerText = q.bText;
    }
    function selectOption(c) {
        const q = questions[currentQuestion];
        if(c === 'A') userScores[q.aScore]++; else userScores[q.bScore]++;
        currentQuestion++; showQ();
    }
    function calculateResult() {
        document.getElementById('quiz-page').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
    }
    function saveAsImageAndRedirect() {
        html2canvas(document.getElementById('capture-area'), { backgroundColor: "#141414", scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = "社群陰暗面結果.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
            window.open("https://s.shopee.tw/8V6bOlaro8", "_blank");
        });
    }
</script>
</body>
</html>
