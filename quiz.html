<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脆癮症報告：社群陰暗面鑑定器</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9874958587973886" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-color: #0d0d0d; --accent-color: #00ff66; }
        body { background-color: var(--bg-color); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        .btn { background: var(--accent-color); color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 10px; }
        
        /* 這裡讓結果變成一張海報 */
        #capture-area { 
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); 
            border: 2px solid var(--accent-color); 
            padding: 30px; border-radius: 20px; text-align: center;
        }
        .result-title { font-size: 1.5rem; color: var(--accent-color); margin: 10px 0; font-weight: 800; }
        #quiz-page, #result-page { display: none; }
        .option-btn { background: #222; color: #fff; border: 1px solid #444; padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9874958587973886" data-ad-slot="填入你的廣告插槽ID" data-ad-format="auto" data-full-width-responsive="false"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<div class="container">
    <div id="start-page">
        <h1>脆癮症鑑定</h1>
        <button class="btn" onclick="startQuiz()">開始測試</button>
    </div>

    <div id="quiz-page">
        <div id="q-text">問題載入中...</div>
        <button class="option-btn" id="opt-A" onclick="selectOption('A')">選項 A</button>
        <button class="option-btn" id="opt-B" onclick="selectOption('B')">選項 B</button>
    </div>

    <div id="result-page">
        <div id="capture-area">
            <div style="color:var(--accent-color); font-size: 0.7rem; letter-spacing: 3px;">社群陰暗面鑑定報告</div>
            <div id="res-icon" style="font-size: 3rem;">👾</div>
            <div class="result-title" id="res-title"></div>
            <div id="res-desc" style="font-size: 0.9rem; margin: 15px 0;"></div>
            <div style="font-size: 0.7rem; opacity: 0.5;">⚠️ 警語：測完請立刻去摸草</div>
        </div>
        <button class="btn" onclick="saveImage()">儲存海報並分享</button>
    </div>
</div>

<script>
    // 簡單的邏輯與截圖功能
    const questions = [{text: "你是巨嬰嗎？", a: "是", b: "絕對是"}]; // 簡化版供參考
    let currentQ = 0;
    
    function startQuiz() { document.getElementById('start-page').style.display='none'; document.getElementById('quiz-page').style.display='block'; }
    
    function saveImage() {
        // 這裡會自動生成一張乾淨的圖片，直接發脆最方便
        html2canvas(document.getElementById("capture-area"), { backgroundColor: "#000" }).then(canvas => {
            const link = document.createElement("a");
            link.download = "我的社群人格.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
            window.open("https://www.threads.net/", "_blank");
        });
    }

    // 補充：將原有的邏輯代碼補回即可
</script>
</body>
</html>
